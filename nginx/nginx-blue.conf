events {}

http {
    upstream active_env {
        server app_blue_1:3000 max_fails=3 fail_timeout=10s;
        server app_blue_2:3000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://active_env;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}