version: '3.8'

services:
  app_blue_1:
    build: .
    container_name: app_blue_1
    restart: always
  app_blue_2:
    build: .
    container_name: app_blue_2
    restart: always

  app_green_1:
    build: .
    container_name: app_green_1
    restart: always
  app_green_2:
    build: .
    container_name: app_green_2
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf